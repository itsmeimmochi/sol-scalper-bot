services:
  observer:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OBSERVER_SSH_LOGS_KEY_HOST_PATH:?Set OBSERVER_SSH_LOGS_KEY_HOST_PATH in observer/.env}:/run/observer/ssh_logs_key:ro
      - ${OBSERVER_SSH_TUNNEL_KEY_HOST_PATH:-${OBSERVER_SSH_LOGS_KEY_HOST_PATH}}:/run/observer/ssh_tunnel_key:ro
